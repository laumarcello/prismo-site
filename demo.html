<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --off-white: #F5F3EF;
    --snow: #FAFAF8;
    --warm-gray: #E8E4DE;
    --stone: #C8C2B8;
    --mid-gray: #7A7570;
    --off-black: #1A1A1A;
    --spectral-full: linear-gradient(90deg, #E4A0B4 0%, #E8C4A0 18%, #D4D8A0 34%, #A0D4B8 50%, #A0BCD8 66%, #A8A0D8 82%, #CCA0D4 100%);
    --spectral-cool: linear-gradient(90deg, #A0D4B8, #A0BCD8, #A8A0D8);
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--off-white);
    color: var(--off-black);
    min-height: 100vh;
  }

  /* --- Nav (same as index.html) --- */
  .nav-wrapper {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--off-white);
    transition: all 0.4s ease;
  }

  .nav-wrapper.scrolled {
    background: linear-gradient(135deg, #E4A0B4 0%, #E8C4A0 18%, #D4D8A0 34%, #A0D4B8 50%, #A0BCD8 66%, #A8A0D8 82%, #CCA0D4 100%);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  nav {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: padding 0.4s ease;
  }

  .nav-wrapper.scrolled nav {
    padding: 16px 32px;
  }

  .nav-logo {
    text-decoration: none;
    display: flex;
    align-items: center;
  }

  .nav-logo-light,
  .nav-logo-dark {
    height: 24px;
    width: auto;
    display: block;
  }

  .nav-logo-dark {
    display: none;
  }

  .nav-wrapper.scrolled .nav-logo-light {
    display: none;
  }

  .nav-wrapper.scrolled .nav-logo-dark {
    display: block;
  }

  .nav-back {
    font-weight: 600;
    font-size: 14px;
    color: var(--mid-gray);
    text-decoration: none;
    transition: color 0.4s ease;
  }

  .nav-back:hover {
    color: var(--off-black);
  }

  .nav-wrapper.scrolled .nav-back {
    color: var(--off-white);
    opacity: 0.8;
  }

  .nav-wrapper.scrolled .nav-back:hover {
    opacity: 1;
  }

  .form-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 32px 60px;
  }

  .form-container iframe {
    width: 100%;
    min-height: 80vh;
    border: 0;
  }

<script>
const navWrapper = document.querySelector('.nav-wrapper');
window.addEventListener('scroll', () => {
  navWrapper.classList.toggle('scrolled', window.scrollY > 60);
});

// Pass UTMs to Tally iframe
(function() {
  const params = new URLSearchParams(window.location.search);
  const utmKeys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
  const utmParts = [];
  utmKeys.forEach(function(key) {
    const val = params.get(key);
    if (val) utmParts.push(key + '=' + encodeURIComponent(val));
  });
  if (utmParts.length > 0) {
    const frame = document.getElementById('tallyFrame');
    const base = frame.getAttribute('data-tally-src');
    frame.setAttribute('data-tally-src', base + '&' + utmParts.join('&'));
  }
})();
</script>
